version: '3.8'

x-base-service: &base-service
  build: .
  restart: unless-stopped
  volumes:
    # Montamos el socket de Docker para que Aegis pueda invocar a Agent Zero
    - /var/run/docker.sock:/var/run/docker.sock
    # Montamos la base de datos para persistencia de usuarios y chats
    - hecate_data:/data
  environment:
    - NODE_OPTIONS=--max-old-space-size=128


services:
  hub:
    <<: *base-service
    container_name: hecate_hub
    env_file: .env
    command: npm run start

  cyber:
    <<: *base-service
    container_name: hecate_cyber
    env_file: .env.cyber
    command: npm run start:cyber

  kendo:
    <<: *base-service
    container_name: hecate_kendo
    env_file: .env.kendo
    command: npm run start:kendo

  inmo:
    <<: *base-service
    container_name: hecate_inmo
    env_file: .env.inmo
    command: npm run start:inmo

  admin:
    <<: *base-service
    container_name: hecate_admin
    env_file: .env.admin
    command: npm run start:admin

  uni:
    <<: *base-service
    container_name: hecate_uni
    env_file: .env.uni
    command: npm run start:uni

  const:
    <<: *base-service
    container_name: hecate_const
    env_file: .env.const
    command: npm run start:const

  mark:
    <<: *base-service
    container_name: hecate_mark
    env_file: .env.mark
    command: npm run start:mark

volumes:
  hecate_data:
